<!DOCTYPE html>
<html lang="en">
<head>
    <script src="{{ url_for('static', filename='js/error-logger.js') }}"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Campaign</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
            padding: 30px;
        }
        h2 {
            color: #2c3e50;
        }
        .section {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            padding: 24px;
            max-width: 700px;
            margin: 0 auto;
        }
        .download-btn {
            display: inline-block;
            margin: 8px 10px 8px 0;
            padding: 10px 18px;
            background-color: #2c3e50;
            color: #fff;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
        }
        .download-btn:hover {
            background-color: #3d5166;
        }
        p {
            color: #4a5568;
            margin-bottom: 16px;
        }
        hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="section">
        <h2>Download Campaign Files</h2>

        <p>Download the generated map outputs from the Advanced Mapping step.</p>

        <a href="/temporary_output/folium_geojson_only.html" target="_blank" class="download-btn">View Folium Map (HTML)</a>
        <a href="/temporary_output/folium_geojson_only.html" download class="download-btn">Download Folium Map (.html)</a>

        <br>

        <a href="/temporary_output/contour_overlay.kmz" download class="download-btn">Download Contour Overlay (.kmz)</a>

        <hr>

        <p>Download all campaign sensor data files from S3 as a zip archive.</p>

        <a href="/download-zip" class="download-btn">Download Campaign Data (.zip)</a>
    </div>
</body>
</html>
