<!-- index.html: Main landing page and navigation shell for the mobile sensor application.
     Called from: browser directly (root / route).
     Calls out to: loads other pages (campaign, selectLocation, renderprocessdata, etc.) into an
                   embedded iframe via navigation buttons; fetches /get_time for the clock display. -->
<!DOCTYPE html>
<html>
<head>
    <script src="{{ url_for('static', filename='js/error-logger.js') }}"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Livermore Urban Heat Island Mapping</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --heat-red: #ff4d1c;
            --heat-orange: #ff8c00;
            --heat-amber: #ffb700;
            --cool-blue: #0a1628;
            --mid-blue: #112240;
            --surface: #0d1f3c;
            --grid-line: rgba(255, 140, 0, 0.08);
            --text-primary: #f0ece4;
            --text-muted: rgba(240, 236, 228, 0.5);
            --btn-active-bg: rgba(255, 77, 28, 0.12);
            --btn-border: rgba(255, 140, 0, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            background-color: var(--cool-blue);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated thermal grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* Radial heat glow */
        body::after {
            content: '';
            position: fixed;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(255,100,20,0.13) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── HEADER ─── */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 36px;
            border-bottom: 1px solid rgba(255, 140, 0, 0.15);
            background: rgba(10, 22, 40, 0.7);
            backdrop-filter: blur(12px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .logo {
            height: 52px;
            width: auto;
            filter: brightness(1.1);
        }

        .header-title-group {
            display: flex;
            flex-direction: column;
        }

        .header-eyebrow {
            font-family: 'Space Mono', monospace;
            font-size: 0.65em;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--heat-orange);
            margin-bottom: 2px;
        }

        h1 {
            font-size: 1.55em;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.1;
        }

        h1 span {
            color: var(--heat-red);
        }

        .header-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.62em;
            color: var(--heat-amber);
            background: rgba(255, 183, 0, 0.08);
            border: 1px solid rgba(255, 183, 0, 0.25);
            border-radius: 4px;
            padding: 5px 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* ─── TOOLBAR ─── */
        .toolbar {
            position: relative;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            padding: 12px 36px;
            background: rgba(13, 31, 60, 0.8);
            border-bottom: 1px solid rgba(255, 140, 0, 0.1);
            backdrop-filter: blur(8px);
        }

        .toolbar-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.6em;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-right: 6px;
        }

        button {
            font-family: 'Space Mono', monospace;
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text-primary);
            background: var(--btn-active-bg);
            border: 1px solid var(--btn-border);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,77,28,0.12), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        button:hover:enabled::before { opacity: 1; }

        button:hover:enabled {
            border-color: var(--heat-orange);
            color: var(--heat-amber);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(255, 100, 20, 0.2);
        }

        button:disabled {
            opacity: 0.32;
            cursor: not-allowed;
            border-color: rgba(255,140,0,0.1);
        }

        button:active:enabled {
            transform: translateY(0);
        }

        /* Accent button (manual) */
        button.btn-accent {
            background: rgba(255, 183, 0, 0.1);
            border-color: rgba(255, 183, 0, 0.45);
            color: var(--heat-amber);
        }
        button.btn-accent:hover:enabled {
            background: rgba(255, 183, 0, 0.18);
            color: #fff;
            border-color: var(--heat-amber);
        }

        /* ─── STATUS BAR ─── */
        .status-bar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 7px 36px;
            background: rgba(10, 22, 40, 0.5);
            border-bottom: 1px solid rgba(255,140,0,0.06);
            font-family: 'Space Mono', monospace;
            font-size: 0.6em;
            color: var(--text-muted);
        }

        .status-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #2ecc71;
            margin-right: 6px;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.5); }
            50% { box-shadow: 0 0 0 5px rgba(46,204,113,0); }
        }

        /* ─── CONTENT FRAME ─── */
        .frame-wrapper {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            padding: 20px 36px 24px;
            gap: 0;
        }

        .frame-shell {
            flex: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 140, 0, 0.15);
            box-shadow:
                0 0 0 1px rgba(255,140,0,0.04),
                0 12px 48px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.04);
            background: var(--surface);
            position: relative;
        }

        /* Thermal top accent line */
        .frame-shell::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--heat-red), var(--heat-orange), var(--heat-amber), transparent);
            z-index: 2;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 220px);
            border: none;
            display: block;
            background: #f5f0e8;
        }

        /* ─── FOOTER ─── */
        footer {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 36px;
            border-top: 1px solid rgba(255,140,0,0.08);
            background: rgba(10,22,40,0.6);
            font-family: 'Space Mono', monospace;
            font-size: 0.6em;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            gap: 16px;
        }

        .footer-heat-bar {
            height: 2px;
            width: 80px;
            background: linear-gradient(90deg, #3b82f6, #22c55e, #eab308, #f97316, #ef4444);
            border-radius: 2px;
        }

        /* ─── ANIMATIONS ─── */
        header, .toolbar, .status-bar {
            animation: slideDown 0.4s ease both;
        }
        .toolbar { animation-delay: 0.05s; }
        .status-bar { animation-delay: 0.1s; }
        .frame-wrapper { animation: fadeUp 0.5s ease 0.15s both; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            header { padding: 14px 18px; flex-wrap: wrap; gap: 12px; }
            .toolbar { padding: 10px 18px; }
            .frame-wrapper { padding: 14px 18px 18px; }
            .status-bar { padding: 7px 18px; }
            h1 { font-size: 1.2em; }
            iframe { height: calc(100vh - 260px); }
        }
    </style>
</head>

<body>

    <!-- ─── HEADER ─── -->
    <header>
        <div class="header-left">
            <img src="{{ url_for('static', filename='QuestLogo.png') }}" alt="Quest Science Center Logo" class="logo">
            <div class="header-title-group">
                <span class="header-eyebrow">Quest Science Center</span>
                <h1>Urban <span>Heat</span> Island Study</h1>
            </div>
        </div>
        
    </header>

    <!-- ─── TOOLBAR ─── -->
    <div class="toolbar">c
        <span class="toolbar-label">Tools →</span>

        <button id="locationBtn" onclick="handleLocation()">⌖ Select Location</button>
        <button id="campaignBtn" onclick="loadIframe('/campaign')" disabled>⊞ Campaign</button>
        <button id="processBtn" onclick="loadIframe('/renderprocessdata')" disabled>⟳ Process Data</button>
        <button id="heatmapBtn" onclick="loadIframe('/map')" disabled>⬡ Temp Map</button>
        <button id="specialProjectsBtn" onclick="loadIframe('/specialprojects')" disabled>✦ Special Projects</button>
        <button id="tempPlotBtn" onclick="loadIframe('/temperatureplot')" disabled>〜 Sensor Temps</button>
        <button id="metadataBtn" onclick="loadIframe('/metadata')" disabled>≡ Metadata</button>
        <button id="downloadBtn" onclick="loadIframe('/download-and-zip')" disabled>↓ Download</button>
        <button id="manualBtn"
            class="btn-accent"

             <button id="manualBtn" onclick="window.open('https://docs.google.com/document/d/1SpkF4H2mIHgj6nMIVavMxqKRo78LIeTwOELwh8MliLA/edit?tab=t.0', '_blank')" style="background-color: yellow; color: blue;">User's Manual</button>
         
    </div>

    <!-- ─── STATUS BAR ─── -->
    <div class="status-bar">
        <span><span class="status-dot"></span>System Ready</span>
        <span>PROJECT · Tri-Valley Youth Climate Action</span>
        <span id="clock"></span>
    </div>

    <!-- ─── IFRAME ─── -->
    <div class="frame-wrapper">
        <div class="frame-shell">
            <iframe
                id="contentFrame"
                scrolling="yes"
                onload="console.log('✅ iframe loaded:', this.src)"
                onerror="console.error('❌ iframe failed to load:', this.src)">
            </iframe>
        </div>
    </div>

    <!-- ─── FOOTER ─── -->
    <footer>
        <div class="footer-heat-bar"></div>
        <span>COOL → WARM → HOT  ·  Urban Heat Island Thermal Scale</span>
        <div class="footer-heat-bar"></div>
    </footer>

    <script>
        function loadIframe(endpoint) {
            console.log("🔄 loadIframe triggered:", endpoint);
            document.getElementById('contentFrame').src = endpoint;
        }

        function handleLocation() {
            loadIframe('/location');
            ['campaignBtn','processBtn','heatmapBtn','tempPlotBtn',
             'specialProjectsBtn','metadataBtn','downloadBtn'].forEach(id => {
                document.getElementById(id).disabled = false;
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            console.log("🚀 DOMContentLoaded fired");
            handleLocation();

            // Live clock
            function updateClock() {
                const now = new Date();
                document.getElementById('clock').textContent =
                    now.toLocaleTimeString('en-US', { hour12: false });
            }
            updateClock();
            setInterval(updateClock, 1000);
        });
    </script>
</body>
</html>
